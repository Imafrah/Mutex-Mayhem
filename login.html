<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | HackBoard AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --black: #0a0a0a;
      --red: #e8253a;
      --red-dark: #b01c2c;
      --cream: #f5f0e8;
      --cream-dim: #d4cfc4;
      --gray: #1a1a1a;
      --gray2: #2a2a2a;
      --gray3: #3a3a3a;
      --yellow: #f5c842;
      --green: #2ecc71;
    }

    body {
      background: var(--black);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      margin: 40px 0;
      position: relative;
      z-index: 1;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 48px;
    }

    .login-vinyl {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 24px;
      background: conic-gradient(#111 0deg, #1a1a1a 45deg, #111 90deg, #1a1a1a 135deg, #111 180deg, #1a1a1a 225deg, #111 270deg, #1a1a1a 315deg);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin-vinyl 4s linear infinite;
      position: relative;
    }

    .login-vinyl::after {
      content: '';
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--red);
      position: absolute;
    }

    .login-vinyl .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    @keyframes spin-vinyl {
      from { transform: rotate(0deg) }
      to { transform: rotate(360deg) }
    }

    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 4px;
      color: var(--cream);
      text-align: center;
    }

    .login-subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--cream-dim);
      text-align: center;
      margin-top: 6px;
    }

    .login-card {
      background: var(--gray);
      border: 1px solid var(--gray2);
      border-radius: 8px;
      padding: 32px;
    }

    .login-card-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--cream-dim);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--cream-dim);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--gray2);
      border: 1px solid var(--gray3);
      color: var(--cream);
      padding: 10px 14px;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: .2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 2px rgba(232, 37, 58, 0.15);
    }

    .form-input::placeholder {
      color: var(--gray3);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      font-weight: 700;
      transition: .2s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: var(--red-dark);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-btn.signup-btn {
      background: transparent;
      border: 1px solid var(--gray3);
      color: var(--cream-dim);
      margin-top: 8px;
    }

    .login-btn.signup-btn:hover {
      border-color: var(--cream-dim);
      color: var(--cream);
    }

    .login-error {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--red);
      letter-spacing: 0.5px;
      margin-top: 12px;
      text-align: center;
      min-height: 16px;
    }

    .login-success {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--green);
      letter-spacing: 0.5px;
      margin-top: 12px;
      text-align: center;
      min-height: 16px;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--gray3);
    }

    .login-footer a {
      color: var(--cream-dim);
      text-decoration: none;
    }

    .login-footer a:hover {
      color: var(--red);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray2);
    }

    .divider span {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--gray3);
    }

    /* Background decorative elements */
    .bg-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.08;
      pointer-events: none;
    }

    .bg-glow-1 {
      top: -100px;
      right: -100px;
      background: var(--red);
    }

    .bg-glow-2 {
      bottom: -100px;
      left: -100px;
      background: var(--yellow);
    }
  </style>
</head>

<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="login-container">
    <div class="login-logo">
      <div class="login-vinyl">
        <div class="ring" style="width:90px;height:90px"></div>
        <div class="ring" style="width:70px;height:70px"></div>
        <div class="ring" style="width:50px;height:50px"></div>
      </div>
      <div class="login-title">HACKBOARD AI</div>
      <div class="login-subtitle">AUTHENTICATION PORTAL</div>
    </div>

    <div class="login-card">
      <div class="login-card-title">SIGN IN TO YOUR DASHBOARD</div>

      <div class="form-group">
        <label class="form-label" for="email">EMAIL ADDRESS</label>
        <input type="email" class="form-input" id="email" placeholder="admincse2@hackboard.ai" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">PASSWORD</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="login-btn" id="login-btn" onclick="handleLogin()">SIGN IN</button>

      <div class="divider"><span>OR</span></div>

      <button class="login-btn signup-btn" id="signup-btn" onclick="handleSignup()">CREATE ACCOUNT</button>
      <button class="login-btn" style="background:#4285F4;color:#fff;border:none;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px" id="google-btn" onclick="handleGoogleLogin()">
        <svg style="width:14px;height:14px" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        SIGN IN WITH GOOGLE
      </button>

      <div class="login-error" id="login-error"></div>
      <div class="login-success" id="login-success"></div>
    </div>

    <div class="login-footer">
      <a href="/">← BACK TO HOME</a>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script type="module" src="firebase-config.js"></script>

  <script>
    // ─── AUTH STATE ───────────────────────────────────────────────
    // Guard so we only redirect once (avoids double-fire on token refresh)
    let authResolved = false;
    let isLoading = false;

    auth.onAuthStateChanged(user => {
      if (authResolved) return;   // ignore subsequent fires
      authResolved = true;

      if (user) {
        // Already logged in — redirect immediately
        if (user.email === 'admincse2@hackboard.ai') {
          window.location.replace('admin.html');
        } else {
          window.location.replace('participant.html');
        }
      }
      // else: not logged in — show the form (nothing to do)
    });

    function showError(msg) {
      document.getElementById('login-error').textContent = msg;
      document.getElementById('login-success').textContent = '';
    }

    function showSuccess(msg) {
      document.getElementById('login-success').textContent = msg;
      document.getElementById('login-error').textContent = '';
    }

    async function handleGoogleLogin() {
      if (isLoading) return;   // prevent double-submit
      setLoading(true);
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const userCredential = await auth.signInWithPopup(provider);
        showSuccess('Authenticated! Redirecting...');
        if (userCredential.user.email === 'admincse2@hackboard.ai') {
          window.location.replace('admin.html');
        } else {
          window.location.replace('participant.html');
        }
      } catch (err) {
        // User cancelled the popup — not a real error
        if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') {
          showError('');
        } else {
          showError('Google Sign-in failed: ' + err.message);
        }
        setLoading(false);
      }
    }

    function setLoading(loading) {
      isLoading = loading;
      const loginBtn = document.getElementById('login-btn');
      const signupBtn = document.getElementById('signup-btn');
      const googleBtn = document.getElementById('google-btn');
      loginBtn.disabled = loading;
      signupBtn.disabled = loading;
      if (googleBtn) googleBtn.disabled = loading;
      loginBtn.textContent = loading ? 'SIGNING IN...' : 'SIGN IN';
      signupBtn.textContent = loading ? 'PLEASE WAIT...' : 'CREATE ACCOUNT';
    }

    async function handleLogin() {
      if (isLoading) return;   // prevent double-submit

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter email and password');
        return;
      }

      setLoading(true);
      try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        showSuccess('Authenticated! Redirecting...');
        if (userCredential.user.email === 'admincse2@hackboard.ai') {
          window.location.replace('admin.html');
        } else {
          window.location.replace('participant.html');
        }
      } catch (err) {
        let msg = 'Authentication failed';
        // Firebase v9 compat: 'auth/user-not-found' & 'auth/wrong-password' are deprecated
        // Both now surface as 'auth/invalid-credential' for security
        if (err.code === 'auth/invalid-credential'
          || err.code === 'auth/user-not-found'
          || err.code === 'auth/wrong-password') {
          msg = 'Invalid email or password';
        } else if (err.code === 'auth/invalid-email') {
          msg = 'Invalid email format';
        } else if (err.code === 'auth/too-many-requests') {
          msg = 'Too many failed attempts. Try again later';
        } else if (err.code === 'auth/network-request-failed') {
          msg = 'Network error. Check your connection';
        } else if (err.code === 'auth/user-disabled') {
          msg = 'This account has been disabled';
        }
        showError(msg);
        setLoading(false);
      }
    }

    async function handleSignup() {
      if (isLoading) return;   // prevent double-submit

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter email and password');
        return;
      }

      // Block admin email from self-registering via this form
      if (email === 'admincse2@hackboard.ai') {
        showError('Admin account cannot be created here');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      setLoading(true);
      try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        showSuccess('Account created! Redirecting...');
        if (userCredential.user.email === 'admincse2@hackboard.ai') {
          window.location.replace('admin.html');
        } else {
          window.location.replace('participant.html');
        }
      } catch (err) {
        let msg = 'Sign up failed';
        if (err.code === 'auth/email-already-in-use') msg = 'That email is already registered';
        else if (err.code === 'auth/weak-password') msg = 'Password too weak (min 6 chars)';
        else if (err.code === 'auth/invalid-email') msg = 'Invalid email format';
        else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection';
        showError(msg);
        setLoading(false);
      }
    }

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>

</html>
